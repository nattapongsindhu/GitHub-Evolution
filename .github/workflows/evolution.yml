name: GitHub Evolution Auto-Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Fetch GitHub stats
        run: python3 scripts/fetch_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README and log
        run: python3 scripts/update_files.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add README.md stats.json log/
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "auto: daily stats $(date -u +%Y-%m-%d)"
          git push
