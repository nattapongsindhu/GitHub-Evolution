name: GitHub Evolution Auto-Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # ทุกวัน 06:00 UTC = 22:00 PST

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Fetch GitHub stats
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, datetime

          TOKEN = os.environ.get("GITHUB_TOKEN", "")
          USER  = "nattapongsindhu"

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          def get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # --- repos ---
          repos = []
          page = 1
          while True:
              data = get(f"https://api.github.com/users/{USER}/repos?per_page=100&page={page}&sort=pushed")
              if not data:
                  break
              repos.extend(data)
              if len(data) < 100:
                  break
              page += 1

          public_repos = [r for r in repos if not r["private"]]
          total_stars   = sum(r["stargazers_count"] for r in public_repos)
          total_forks   = sum(r["forks_count"] for r in public_repos)
          languages     = {}
          for r in public_repos:
              lang = r.get("language")
              if lang:
                  languages[lang] = languages.get(lang, 0) + 1
          top_langs = sorted(languages.items(), key=lambda x: -x[1])[:5]

          # --- recent commits across repos (last 7 days) ---
          since = (datetime.datetime.utcnow() - datetime.timedelta(days=7)).strftime("%Y-%m-%dT%H:%M:%SZ")
          weekly_commits = 0
          active_repos   = []
          for r in public_repos[:20]:  # check 20 most recently pushed
              try:
                  commits = get(f"https://api.github.com/repos/{USER}/{r['name']}/commits?since={since}&per_page=100")
                  count   = len(commits)
                  if count > 0:
                      weekly_commits += count
                      active_repos.append({"name": r["name"], "commits": count, "pushed": r["pushed_at"]})
              except Exception:
                  pass

          # --- most recent push ---
          latest_repo = public_repos[0] if public_repos else {}

          # --- streak (estimate from events) ---
          try:
              events = get(f"https://api.github.com/users/{USER}/events?per_page=100")
              push_days = set()
              for e in events:
                  if e["type"] == "PushEvent":
                      day = e["created_at"][:10]
                      push_days.add(day)
              today = datetime.date.today()
              streak = 0
              for i in range(30):
                  d = (today - datetime.timedelta(days=i)).isoformat()
                  if d in push_days:
                      streak += 1
                  elif i > 0:
                      break
          except Exception:
              streak = 0

          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          result = {
              "updated": now,
              "public_repos": len(public_repos),
              "total_stars": total_stars,
              "total_forks": total_forks,
              "top_languages": top_langs,
              "weekly_commits": weekly_commits,
              "active_repos": active_repos[:5],
              "latest_repo": latest_repo.get("name", ""),
              "latest_pushed": latest_repo.get("pushed_at", "")[:10],
              "streak_days": streak
          }

          with open("stats.json", "w") as f:
              json.dump(result, f, indent=2)

          print(json.dumps(result, indent=2))
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README
        run: |
          python3 - <<'EOF'
          import json, datetime

          with open("stats.json") as f:
              s = json.load(f)

          today     = datetime.date.today()
          week_num  = today.isocalendar()[1]
          month     = today.strftime("%B %Y")
          year      = today.year

          # language bar
          langs = s["top_languages"]
          lang_lines = "\n".join(f"  - {l}: {c} repo{'s' if c>1 else ''}" for l, c in langs)

          # active repos table
          if s["active_repos"]:
              repo_rows = "\n".join(
                  f"| [{r['name']}](https://github.com/nattapongsindhu/{r['name']}) | {r['commits']} | {r['pushed'][:10]} |"
                  for r in s["active_repos"]
              )
              repo_table = f"""| Repository | Commits (7d) | Last Push |
|------------|-------------|-----------|
{repo_rows}"""
          else:
              repo_table = "_No pushes in the last 7 days_"

          streak_emoji = "🔥" if s["streak_days"] >= 3 else "📅"

          readme = f"""# 🧬 GitHub Evolution

![Last Update](https://img.shields.io/badge/Updated-{s['updated'].replace(' ', '_').replace(':', '%3A')}-blue?style=flat-square)
![Repos](https://img.shields.io/badge/Public_Repos-{s['public_repos']}-informational?style=flat-square)
![Stars](https://img.shields.io/badge/Total_Stars-{s['total_stars']}-yellow?style=flat-square)
![Weekly](https://img.shields.io/badge/Commits_This_Week-{s['weekly_commits']}-brightgreen?style=flat-square)

> Tracking my GitHub development progress, goals, and milestones.
> Auto-updated daily via GitHub Actions.

---

## 📊 Live Stats — Week {week_num}, {month}

| Metric | Value |
|--------|-------|
| 📁 Public Repositories | {s['public_repos']} |
| ⭐ Total Stars | {s['total_stars']} |
| 🍴 Total Forks | {s['total_forks']} |
| 📝 Commits This Week | {s['weekly_commits']} |
| {streak_emoji} Current Streak | {s['streak_days']} day{'s' if s['streak_days'] != 1 else ''} |
| 🚀 Last Active Repo | [{s['latest_repo']}](https://github.com/nattapongsindhu/{s['latest_repo']}) |
| 🕐 Last Push | {s['latest_pushed']} |

---

## 🔥 Active This Week

{repo_table}

---

## 💻 Top Languages

{lang_lines}

---

## 🗂 Repository Index

| Repo | Purpose |
|------|---------|
| [la-weather-automet](https://github.com/nattapongsindhu/la-weather-automet) | CI/CD pipeline — LA weather data auto-updated every 6h |
| [GitHub-Evolution](https://github.com/nattapongsindhu/GitHub-Evolution) | This repo — auto-tracking GitHub progress daily |

---

## 🎯 {year} Goals

| Area | Goal | Status |
|------|------|--------|
| IT | Complete Cybersecurity coursework at LACC | 🔄 In progress |
| Aviation | Private Pilot License — bush flying focus | 🔄 In progress |
| GitHub | Maintain consistent commit activity | ✅ Active |
| Career | Build IT portfolio for second income stream | 🔄 In progress |

---

## 📁 Structure

```
log/2026/       # Monthly logs — fill when you have something worth noting
goals/2026/     # Q2, Q3 goals tied to real activities
projects/       # active/ and archived/ project notes
reviews/        # Weekly reflections — optional, fill on days off
```

---

_Stats auto-generated from GitHub API · Last run: {s['updated']}_
"""

          with open("README.md", "w") as f:
              f.write(readme)

          print("README updated")
          EOF

      - name: Update monthly log
        run: |
          python3 - <<'EOF'
          import json, datetime, os

          with open("stats.json") as f:
              s = json.load(f)

          today    = datetime.date.today()
          month_fn = f"log/{today.year}/{today.month:02d}-{today.strftime('%B').lower()}.md"

          os.makedirs(os.path.dirname(month_fn), exist_ok=True)

          # Read existing or create header
          if os.path.exists(month_fn):
              with open(month_fn) as f:
                  content = f.read()
          else:
              content = f"# Log — {today.strftime('%B %Y')}\n\n"

          date_str  = today.isoformat()
          new_entry = (
              f"\n## {date_str}\n"
              f"- Commits this week: {s['weekly_commits']} | "
              f"Active repos: {len(s['active_repos'])} | "
              f"Streak: {s['streak_days']}d\n"
              f"- Last push: [{s['latest_repo']}](https://github.com/nattapongsindhu/{s['latest_repo']})\n"
          )

          # Only append if today's entry doesn't exist yet
          if date_str not in content:
              content += new_entry
              with open(month_fn, "w") as f:
                  f.write(content)
              print(f"Appended entry for {date_str}")
          else:
              # Update existing entry
              lines   = content.split("\n")
              out     = []
              skip    = False
              for line in lines:
                  if line.startswith(f"## {date_str}"):
                      skip = True
                      out.append(line)
                      continue
                  if skip and line.startswith("## 20"):
                      skip = False
                  if not skip:
                      out.append(line)
              out.append(new_entry)
              with open(month_fn, "w") as f:
                  f.write("\n".join(out))
              print(f"Updated entry for {date_str}")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add README.md stats.json log/
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "auto: daily stats $(date -u +%Y-%m-%d)"
          git push
